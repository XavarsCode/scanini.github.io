<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WC26 Live Scanner</title>
    <script src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #0a0a0a; color: white; margin: 0; padding: 10px; }
        .header { background: #e21b22; padding: 12px; font-weight: bold; font-size: 18px; border-radius: 0 0 12px 12px; margin-bottom: 10px; }
        .camera-container { position: relative; width: 100%; max-width: 400px; height: 300px; margin: auto; border-radius: 12px; overflow: hidden; border: 2px solid #333; background: #000; }
        
        /* Vidéo cachée, on affiche le canvas OpenCV redessiné par-dessus */
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        
        .laser { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #00ff00; box-shadow: 0 0 10px #00ff00; animation: scan 2.5s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        
        .btn-zone { margin: 15px 0; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn { background: #00ff00; color: black; padding: 12px 24px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; width: 85%; max-width: 300px; }
        .btn-csv { background: #007bff; color: white; display: none; }
        
        .result-box { background: #151515; padding: 15px; border-radius: 12px; border: 1px solid #222; text-align: left; max-width: 380px; margin: auto; }
        .missing-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .missing-item { background: rgba(226, 27, 34, 0.15); color: #ff4d4d; border: 1px solid #e21b22; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        #loading-opencv { color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">PANINI WC26 - LIVE SCANNER</div>
<div id="loading-opencv">⏳ Chargement de l'intelligence artificielle (OpenCV)...</div>

<div class="camera-container">
    <video id="video" playsinline autoplay></video>
    <canvas id="canvasOutput"></canvas>
    <div class="laser"></div>
</div>

<div class="btn-zone">
    <button class="btn" id="start-btn" disabled>▶️ OUVRIR LE SCANNER</button>
    <button class="btn btn-csv" id="csv-btn">📥 EXPORTER LES MANQUANTS (.CSV)</button>
</div>

<div class="result-box">
    <h3 style="margin: 0; font-size: 15px; color: #00ff00;">📡 Statut : <span id="status" style="color:white;">En attente de l'IA</span></h3>
    <p style="margin: 10px 0 5px 0; font-size: 13px; color: #888;">Numéros manquants détectés en direct (Changer de page pour mettre à jour) :</p>
    <div id="missing-numbers" class="missing-list"></div>
</div>

<canvas id="canvasHidden" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvasOutput = document.getElementById('canvasOutput');
    const canvasHidden = document.getElementById('canvasHidden');
    const startBtn = document.getElementById('start-btn');
    const csvBtn = document.getElementById('csv-btn');
    const statusText = document.getElementById('status');
    const missingDiv = document.getElementById('missing-numbers');
    const loadingText = document.getElementById('loading-opencv');

    let ctxHidden = canvasHidden.getContext('2d');
    let listeManquantsGlobale = new Set();
    let src, gray, threshold_output, contours, hierarchy;
    let streaming = false;

    // Vérifier si OpenCV est prêt
    cv['onRuntimeInitialized'] = () => {
        loadingText.style.display = 'none';
        startBtn.removeAttribute('disabled');
        statusText.innerText = "Prêt à démarrer";
    };

    // Démarrer la caméra
    startBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 }, 
                audio: false 
            });
            video.srcObject = stream;
            video.play();
            streaming = true;
            startBtn.style.display = 'none';
            statusText.innerText = "Scan en direct actif";
            
            // Initialisation des éléments OpenCV une fois la vidéo lancée
            setTimeout(() => {
                canvasOutput.width = video.videoWidth;
                canvasOutput.height = video.videoHeight;
                canvasHidden.width = video.videoWidth;
                canvasHidden.height = video.videoHeight;
                
                src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                gray = new cv.Mat();
                threshold_output = new cv.Mat();
                contours = new cv.MatVector();
                hierarchy = new cv.Mat();
                
                // Lancement de la boucle de traitement d'image
                requestAnimationFrame(processVideo);
            }, 1000);
        } catch (err) {
            alert("Erreur d'accès à la caméra arrière.");
            console.error(err);
        }
    });

    // Boucle de détection en temps réel (S'exécute à chaque changement d'image)
    function processVideo() {
        if (!streaming) return;

        // 1. Capturer l'image de la vidéo sur le canvas masqué
        ctxHidden.drawImage(video, 0, 0, canvasHidden.width, canvasHidden.height);
        let imgData = ctxHidden.getImageData(0, 0, canvasHidden.width, canvasHidden.height);
        src.data.set(imgData.data);

        // 2. Traitement OpenCV (Gris + Seuillage pour isoler la grille)
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
        cv.threshold(gray, threshold_output, 120, 255, cv.THRESH_BINARY_INV);
        cv.findContours(threshold_output, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

        let localMissing = [];
        let finalDisplay = src.clone();

        // 3. Analyser la forme et la couleur des cases de l'album
        for (let i = 0; i < contours.size(); ++i) {
            let cnt = contours.get(i);
            let rect = cv.boundingRect(cnt);
            let area = rect.width * rect.height;

            // Détecter si la zone ressemble à un emplacement Panini (ratio carré/rectangle)
            if (area > 3000 && area < 12000 && rect.width / rect.height > 0.6 && rect.width / rect.height < 1.4) {
                let cellRoi = gray.roi(rect);
                let mean = new cv.Mat();
                let stddev = new cv.Mat();
                cv.meanStdDev(cellRoi, mean, stddev);
                
                let variance = Math.pow(stddev.data64F[0], 2);

                // Analyse de la page (Exemple basé sur l'album du Maroc)
                // Variance basse = case vide (couleur uniforme unie), Variance haute = Sticker collé
                if (variance < 25) { 
                    // CASE VIDE : Rectangle Rouge Épais
                    let p1 = new cv.Point(rect.x, rect.y);
                    let p2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                    cv.rectangle(finalDisplay, p1, p2, [226, 27, 34, 255], 3);
                    
                    // Calcul approximatif du numéro selon la position x sur l'écran
                    let simulatedNum = Math.floor((rect.x / canvasOutput.width) * 19) + 1;
                    if(!localMissing.includes(simulatedNum)) {
                        localMissing.push(simulatedNum);
                        listeManquantsGlobale.add(`MAR ${simulatedNum}`);
                    }
                } else {
                    // CASE PLEINE : Rectangle Vert Fin
                    let p1 = new cv.Point(rect.x, rect.y);
                    let p2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                    cv.rectangle(finalDisplay, p1, p2, [0, 255, 0, 255], 1);
                }
                cellRoi.delete(); mean.delete(); stddev.delete();
            }
        }

        // Afficher le résultat avec les filtres de couleurs sur l'écran du tel
        cv.imshow('canvasOutput', finalDisplay);
        finalDisplay.delete();

        // Mettre à jour la liste des cartes manquantes sur l'interface
        if(localMissing.length > 0) {
            missingDiv.innerHTML = "";
            Array.from(listeManquantsGlobale).sort().forEach(item => {
                const span = document.createElement('span');
                span.className = 'missing-item';
                span.innerText = item;
                missingDiv.appendChild(span);
            });
            csvBtn.style.display = 'block';
        }

        // Relancer la boucle pour la frame vidéo suivante
        requestAnimationFrame(processVideo);
    }

    // Export CSV fonctionnel
    csvBtn.addEventListener('click', () => {
        if (listeManquantsGlobale.size === 0) return;
        let csvContent = "data:text/csv;charset=utf-8,Nation,Numero Manquant\n";
        Array.from(listeManquantsGlobale).sort().forEach(item => {
            let parts = item.split(" ");
            csvContent += `${parts[0]},${parts[1]}\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "panini_manquants_wc26.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>
</body>
</html>
