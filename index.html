<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Panini Scanner WC26</title>
    <script src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; text-align: center; background: #0a0a0a; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .header { background: #e21b22; padding: 15px; font-weight: bold; font-size: 20px; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Conteneur de la caméra avec l'animation de scan */
        .camera-container { position: relative; width: 100%; max-width: 400px; height: 300px; margin: 15px auto; border-radius: 15px; overflow: hidden; border: 3px solid #333; background: #1a1a1a; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* La ligne de scan laser animate */
        .laser { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to bottom, rgba(0,255,0,0), rgba(0,255,0,1)); box-shadow: 0 0 15px #00ff00; animation: scanning 2s linear infinite; display: none; }
        @keyframes scanning {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Coins de visée pour aider le cadrage */
        .corner { position: absolute; width: 20px; height: 20px; border: 3px solid #00ff00; }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .top-right { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .btn { background: #00ff00; color: black; padding: 12px 25px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; width: 80%; box-shadow: 0 4px 10px rgba(0,255,0,0.3); }
        .result-box { background: #151515; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #222; text-align: left; }
        .nation-badge { background: #222; padding: 5px 10px; border-radius: 5px; font-size: 14px; color: #aaa; float: right; border: 1px solid #333; }
        .missing-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .missing-item { background: rgba(226, 27, 34, 0.2); color: #ff4d4d; border: 1px solid #e21b22; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; animation: popIn 0.3s ease; }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">PANINI LIVE SCANNER</div>

<div class="container">
    <p style="color: #aaa; font-size: 14px;">Centre une double page dans le cadre pour la détecter automatiquement.</p>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="laser" id="laser"></div>
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>

    <button class="btn" id="start-btn">▶️ LANCER LE SCANNER</button>

    <div class="result-box">
        <span class="nation-badge" id="nation-name">En attente...</span>
        <h3 style="margin: 0 0 10px 0; font-size: 16px; color: #00ff00;">📡 Statut : <span id="status">Inactif</span></h3>
        <hr style="border: 0; border-top: 1px solid #222;">
        <p style="margin: 10px 0 5px 0; font-size: 14px; color: #888;">Cartes manquantes trouvées en direct :</p>
        <div id="missing-numbers" class="missing-list"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-btn');
    const laser = document.getElementById('laser');
    const statusText = document.getElementById('status');
    const nationName = document.getElementById('nation-name');
    const missingNumbersDiv = document.getElementById('missing-numbers');

    // Démarrer la caméra arrière du téléphone en direct
    startBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }, // Utilise la caméra arrière
                audio: false
            });
            video.srcObject = stream;
            laser.style.display = "block"; // Active la ligne de scan animée
            statusText.innerText = "Analyse en cours...";
            statusText.style.color = "#00ff00";
            startBtn.style.display = "none";

            // Simuler l'analyse de flux vidéo en continu
            lancerAnalyseFlux();
        } catch (err) {
            alert("Erreur d'accès à la caméra. Vérifie les autorisations.");
            console.error(err);
        }
    });

    function lancerAnalyseFlux() {
        // Dans la vraie appli, OpenCV.js analyse 10 images par seconde ici.
        // On simule une détection après 2,5 secondes de scan (le temps que l'utilisateur cadre la page Maroc)
        setTimeout(() => {
            nationName.innerText = "MAROC (MAR)";
            nationName.style.background = "#006233"; // Couleur Maroc
            nationName.style.color = "white";
            
            // Les numéros manquants apparaissent un par un avec l'animation popIn
            const manquants = [2, 5, 6, 9, 12, 16, 17, 19];
            missingNumbersDiv.innerHTML = "";
            
            manquants.forEach((num, index) => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.className = 'missing-item';
                    span.innerText = `MAR ${num}`;
                    missingNumbersDiv.appendChild(span);
                    
                    // Petit effet sonore de "bip" optionnel ou vibration si supporté
                    if (navigator.vibrate) navigator.vibrate(50);
                }, index * 200); // Décale l'apparition de chaque numéro pour faire "effet calcul"
            });

            statusText.innerText = "Page synchronisée !";
            statusText.style.color = "#ffffff";
        }, 2500);
    }
</script>

</body>
</html>
